# Nombre conservado del laboratorio original; esta version esta corregida.
AWSTemplateFormatVersion: '2010-09-09'
Description: Plantilla corregida para crear una instancia EC2 con SSH restringido.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Red"
        Parameters: [VpcId, SubnetId]
      - Label:
          default: "Instancia"
        Parameters: [InstanceType, LatestAmiId]
      - Label:
          default: "Acceso SSH"
        Parameters: [AllowedSshCidr, KeyName]
      - Label:
          default: "Configuracion"
        Parameters: [EnvironmentName]
    ParameterLabels:
      VpcId:
        default: "ID de la VPC"
      SubnetId:
        default: "ID de la Subnet"
      InstanceType:
        default: "Tipo de instancia"
      LatestAmiId:
        default: "AMI (SSM Parameter Store)"
      AllowedSshCidr:
        default: "CIDR permitido para SSH"
      KeyName:
        default: "Nombre del KeyPair"
      EnvironmentName:
        default: "Ambiente"

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC donde se creara el grupo de seguridad.
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet donde se lanzara la instancia EC2.
  KeyName:
    Description: Nombre opcional de un SSH KeyPair existente.
    Type: String
    Default: ''
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t2.micro
    Description: Tipo de instancia EC2.
  AllowedSshCidr:
    Type: String
    Default: 203.0.113.10/32
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}/([0-9]|[12][0-9]|3[0-2])$'
    ConstraintDescription: Ingresa un CIDR IPv4 valido, por ejemplo 203.0.113.10/32.
    Description: CIDR permitido para SSH. Reemplaza el valor por tu IP publica /32.
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: AMI de Amazon Linux obtenida desde Parameter Store.
  EnvironmentName:
    Type: String
    Default: lab
    AllowedValues: [lab, dev, staging, prod]
    Description: Ambiente de despliegue usado en los tags.

Conditions:
  UseKeyPair: !Not [!Equals [!Ref KeyName, '']]

Resources:
  MyEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref LatestAmiId
      KeyName: !If [UseKeyPair, !Ref KeyName, !Ref AWS::NoValue]
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      MetadataOptions:
        HttpEndpoint: enabled
        HttpTokens: required
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-ec2'
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Acceso SSH restringido
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedSshCidr
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-sg'

Outputs:
  InstanceID:
    Description: ID de la instancia EC2.
    Value: !Ref MyEC2Instance
    Export:
      Name: !Sub '${AWS::StackName}-InstanceId'
  SecurityGroupID:
    Description: ID del grupo de seguridad.
    Value: !Ref InstanceSecurityGroup
    Export:
      Name: !Sub '${AWS::StackName}-SecurityGroupId'
