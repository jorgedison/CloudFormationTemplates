AWSTemplateFormatVersion: '2010-09-09'
Description: Crea una instancia EC2 con Elastic IP y SSH restringido.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Red"
        Parameters: [VpcId, SubnetId]
      - Label:
          default: "Instancia"
        Parameters: [InstanceType, LatestAmiId]
      - Label:
          default: "Seguridad"
        Parameters: [AllowedSshCidr]
    ParameterLabels:
      VpcId:
        default: "ID de la VPC"
      SubnetId:
        default: "ID de la Subnet"
      InstanceType:
        default: "Tipo de instancia"
      LatestAmiId:
        default: "AMI (SSM Parameter Store)"
      AllowedSshCidr:
        default: "CIDR permitido para SSH"

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC donde se creara el grupo de seguridad.
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet publica donde se lanzara la instancia EC2.
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t2.micro
    Description: Tipo de instancia EC2.
  AllowedSshCidr:
    Type: String
    Default: 203.0.113.10/32
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}/([0-9]|[12][0-9]|3[0-2])$'
    ConstraintDescription: Ingresa un CIDR IPv4 valido, por ejemplo 203.0.113.10/32.
    Description: CIDR permitido para SSH. Reemplaza el valor por tu IP publica /32.
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: AMI de Amazon Linux obtenida desde Parameter Store.

Resources:
  MySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Acceso SSH restringido
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - CidrIp: !Ref AllowedSshCidr
          FromPort: 22
          IpProtocol: tcp
          ToPort: 22
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-sg'

  MyEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref MySecurityGroup
      MetadataOptions:
        HttpEndpoint: enabled
        HttpTokens: required
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-ec2'

  MyEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-eip'

  MyEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt MyEIP.AllocationId
      InstanceId: !Ref MyEC2Instance

Outputs:
  InstanceID:
    Description: ID de la instancia EC2.
    Value: !Ref MyEC2Instance
    Export:
      Name: !Sub '${AWS::StackName}-InstanceId'
  ElasticIP:
    Description: Elastic IP asociada a la instancia.
    Value: !Ref MyEIP
    Export:
      Name: !Sub '${AWS::StackName}-ElasticIp'
