AWSTemplateFormatVersion: '2010-09-09'
Description: Crea una instancia EC2 basica en una subnet existente.

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC donde se creara el grupo de seguridad.
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet donde se lanzara la instancia EC2.
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t2.micro
    Description: Tipo de instancia EC2.
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: AMI de Amazon Linux obtenida desde Parameter Store.

Resources:
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Sin reglas de entrada por defecto
      VpcId: !Ref VpcId
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-sg'

  MyEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      MetadataOptions:
        HttpEndpoint: enabled
        HttpTokens: required
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-ec2'

Outputs:
  InstanceID:
    Description: ID de la instancia EC2.
    Value: !Ref MyEC2Instance
    Export:
      Name: !Sub '${AWS::StackName}-InstanceId'
