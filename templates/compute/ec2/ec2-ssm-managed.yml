AWSTemplateFormatVersion: '2010-09-09'
Description: Plantilla recomendada para crear una instancia EC2 administrable con SSM.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Red"
        Parameters: [VpcId, SubnetId]
      - Label:
          default: "Instancia"
        Parameters: [InstanceType, LatestAmiId, RootVolumeSize]
      - Label:
          default: "Configuracion"
        Parameters: [EnvironmentName]
    ParameterLabels:
      VpcId:
        default: "ID de la VPC"
      SubnetId:
        default: "ID de la Subnet"
      InstanceType:
        default: "Tipo de instancia"
      LatestAmiId:
        default: "AMI (SSM Parameter Store)"
      RootVolumeSize:
        default: "Tamano del volumen raiz (GiB)"
      EnvironmentName:
        default: "Ambiente"

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC donde se creara el grupo de seguridad.
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet donde se lanzara la instancia EC2. Requiere salida a internet o VPC endpoints para SSM.
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t2.micro
      - t3.small
    Description: Tipo de instancia EC2.
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: AMI de Amazon Linux obtenida desde Parameter Store.
  RootVolumeSize:
    Type: Number
    Default: 8
    MinValue: 8
    MaxValue: 1024
    Description: Tamano en GiB del volumen raiz gp3 cifrado.
  EnvironmentName:
    Type: String
    Default: lab
    AllowedValues: [lab, dev, staging, prod]
    Description: Ambiente de despliegue usado en los tags.

Resources:
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-ssm-role'
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Sin reglas de entrada; acceso administrativo via SSM
      VpcId: !Ref VpcId
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-sg'
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  MyEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      IamInstanceProfile: !Ref InstanceProfile
      InstanceType: !Ref InstanceType
      ImageId: !Ref LatestAmiId
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      MetadataOptions:
        HttpEndpoint: enabled
        HttpTokens: required
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            DeleteOnTermination: true
            Encrypted: true
            VolumeSize: !Ref RootVolumeSize
            VolumeType: gp3
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-ec2'
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  InstanceID:
    Description: ID de la instancia EC2.
    Value: !Ref MyEC2Instance
    Export:
      Name: !Sub '${AWS::StackName}-InstanceId'
  SecurityGroupID:
    Description: ID del grupo de seguridad sin reglas de entrada.
    Value: !Ref InstanceSecurityGroup
    Export:
      Name: !Sub '${AWS::StackName}-SecurityGroupId'
  InstanceRoleName:
    Description: Rol IAM usado para SSM Session Manager.
    Value: !Ref InstanceRole
    Export:
      Name: !Sub '${AWS::StackName}-InstanceRoleName'
