AWSTemplateFormatVersion: '2010-09-09'
Description: Crea una instancia EC2 con Apache via UserData y HTTP publico.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Red"
        Parameters: [VpcId, SubnetId]
      - Label:
          default: "Instancia"
        Parameters: [InstanceType, LatestAmiId, RootVolumeSize]
      - Label:
          default: "Seguridad"
        Parameters: [AllowedHttpCidr, AllowedSshCidr, KeyName]
      - Label:
          default: "Configuracion"
        Parameters: [EnvironmentName]
    ParameterLabels:
      VpcId:
        default: "ID de la VPC"
      SubnetId:
        default: "ID de la Subnet"
      InstanceType:
        default: "Tipo de instancia"
      LatestAmiId:
        default: "AMI (SSM Parameter Store)"
      RootVolumeSize:
        default: "Tamano del volumen raiz (GiB)"
      AllowedSshCidr:
        default: "CIDR permitido para SSH"
      AllowedHttpCidr:
        default: "CIDR permitido para HTTP"
      KeyName:
        default: "Nombre del KeyPair"
      EnvironmentName:
        default: "Ambiente"

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC donde se creara el grupo de seguridad.
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet publica donde se lanzara la instancia EC2.
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t2.micro
    Description: Tipo de instancia EC2.
  AllowedHttpCidr:
    Type: String
    Default: 0.0.0.0/0
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}/([0-9]|[12][0-9]|3[0-2])$'
    ConstraintDescription: Ingresa un CIDR IPv4 valido, por ejemplo 0.0.0.0/0.
    Description: CIDR permitido para HTTP.
  AllowedSshCidr:
    Type: String
    Default: 203.0.113.10/32
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}/([0-9]|[12][0-9]|3[0-2])$'
    ConstraintDescription: Ingresa un CIDR IPv4 valido, por ejemplo 203.0.113.10/32.
    Description: CIDR permitido para SSH. Solo se usa cuando KeyName no esta vacio.
  KeyName:
    Type: String
    Default: ''
    AllowedPattern: '^$|[A-Za-z0-9._/@+=,-]+$'
    Description: Nombre opcional de un SSH KeyPair existente. Si se omite, no se abre SSH.
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: AMI de Amazon Linux obtenida desde Parameter Store.
  RootVolumeSize:
    Type: Number
    Default: 8
    MinValue: 8
    MaxValue: 1024
    Description: Tamano en GiB del volumen raiz gp3 cifrado.
  EnvironmentName:
    Type: String
    Default: lab
    AllowedValues: [lab, dev, staging, prod]
    Description: Ambiente de despliegue usado en los tags.

Conditions:
  UseKeyPair: !Not [!Equals [!Ref KeyName, '']]

Resources:
  MySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Acceso HTTP y SSH restringido opcional
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - CidrIp: !Ref AllowedHttpCidr
          FromPort: 80
          IpProtocol: tcp
          ToPort: 80
        - !If
          - UseKeyPair
          - CidrIp: !Ref AllowedSshCidr
            FromPort: 22
            IpProtocol: tcp
            ToPort: 22
          - !Ref AWS::NoValue
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-sg'
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  MyEC2Instance:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal:
        Timeout: PT5M
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      KeyName: !If [UseKeyPair, !Ref KeyName, !Ref AWS::NoValue]
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref MySecurityGroup
      MetadataOptions:
        HttpEndpoint: enabled
        HttpTokens: required
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            DeleteOnTermination: true
            Encrypted: true
            VolumeSize: !Ref RootVolumeSize
            VolumeType: gp3
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -eux
          trap '/opt/aws/bin/cfn-signal -e 1 --stack ${AWS::StackName} --resource MyEC2Instance --region ${AWS::Region}' ERR
          dnf update -y
          dnf install -y httpd
          systemctl enable --now httpd
          cat > /var/www/html/index.html <<'HTML'
          This EC2 instance is running successfully!
          HTML
          /opt/aws/bin/cfn-signal -e 0 --stack ${AWS::StackName} --resource MyEC2Instance --region ${AWS::Region}
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-web'
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  MyEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-eip'
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  MyEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt MyEIP.AllocationId
      InstanceId: !Ref MyEC2Instance

Outputs:
  InstanceID:
    Description: ID de la instancia EC2.
    Value: !Ref MyEC2Instance
    Export:
      Name: !Sub '${AWS::StackName}-InstanceId'
  ElasticIP:
    Description: Elastic IP asociada a la instancia.
    Value: !Ref MyEIP
    Export:
      Name: !Sub '${AWS::StackName}-ElasticIp'
  WebsiteURL:
    Description: URL del sitio web creado por UserData.
    Value: !Sub 'http://${MyEIP}'
    Export:
      Name: !Sub '${AWS::StackName}-WebsiteUrl'
