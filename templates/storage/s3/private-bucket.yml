AWSTemplateFormatVersion: '2010-09-09'
Description: Crea un bucket S3 privado con cifrado, versionado, bloqueo publico y controles opcionales de auditoria.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Identificacion"
        Parameters: [BucketName, EnvironmentName]
      - Label:
          default: "Cifrado"
        Parameters: [EncryptionType, KmsKeyArn]
      - Label:
          default: "Versionado y ciclo de vida"
        Parameters: [EnableVersioning, NoncurrentVersionRetentionDays]
      - Label:
          default: "Auditoria"
        Parameters: [AccessLogBucketName, AccessLogPrefix]
    ParameterLabels:
      BucketName:
        default: "Nombre del bucket"
      EnvironmentName:
        default: "Ambiente"
      EncryptionType:
        default: "Tipo de cifrado"
      KmsKeyArn:
        default: "ARN de KMS opcional"
      EnableVersioning:
        default: "Versionado"
      NoncurrentVersionRetentionDays:
        default: "Retencion de versiones antiguas (dias)"
      AccessLogBucketName:
        default: "Bucket destino para access logs"
      AccessLogPrefix:
        default: "Prefijo para access logs"

Parameters:
  BucketName:
    Type: String
    Default: ''
    AllowedPattern: '^$|^[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]$'
    Description: Nombre opcional del bucket. Dejalo vacio para que CloudFormation genere uno.
  EncryptionType:
    Type: String
    Default: SSE-S3
    AllowedValues: [SSE-S3, SSE-KMS]
    Description: Usa SSE-S3 por defecto o SSE-KMS para cargas con mayor control de claves.
  KmsKeyArn:
    Type: String
    Default: ''
    Description: ARN opcional de una CMK KMS. Si se omite con SSE-KMS, S3 usa la clave administrada de AWS.
  EnableVersioning:
    Type: String
    Default: Enabled
    AllowedValues:
      - Enabled
      - Suspended
    Description: Estado del versionado del bucket.
  NoncurrentVersionRetentionDays:
    Type: Number
    Default: 90
    MinValue: 1
    Description: Dias que se retienen versiones antiguas antes de eliminarlas (solo aplica con versionado habilitado).
  AccessLogBucketName:
    Type: String
    Default: ''
    AllowedPattern: '^$|^[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]$'
    Description: Bucket destino opcional para server access logs. Debe existir y permitir escritura de logs de S3.
  AccessLogPrefix:
    Type: String
    Default: s3-access-logs/
    Description: Prefijo usado cuando AccessLogBucketName esta configurado.
  EnvironmentName:
    Type: String
    Default: lab
    AllowedValues: [lab, dev, staging, prod]
    Description: Ambiente de despliegue usado en los tags.

Conditions:
  UseBucketName: !Not [!Equals [!Ref BucketName, '']]
  VersioningEnabled: !Equals [!Ref EnableVersioning, Enabled]
  UseKmsEncryption: !Equals [!Ref EncryptionType, SSE-KMS]
  UseCustomerKmsKey: !And
    - !Condition UseKmsEncryption
    - !Not [!Equals [!Ref KmsKeyArn, '']]
  UseAccessLogging: !Not [!Equals [!Ref AccessLogBucketName, '']]

Resources:
  PrivateBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !If [UseBucketName, !Ref BucketName, !Ref AWS::NoValue]
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: !If [UseKmsEncryption, 'aws:kms', AES256]
              KMSMasterKeyID: !If [UseCustomerKmsKey, !Ref KmsKeyArn, !Ref AWS::NoValue]
            BucketKeyEnabled: !If [UseKmsEncryption, true, !Ref AWS::NoValue]
      LoggingConfiguration: !If
        - UseAccessLogging
        - DestinationBucketName: !Ref AccessLogBucketName
          LogFilePrefix: !Ref AccessLogPrefix
        - !Ref AWS::NoValue
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: !Ref EnableVersioning
      LifecycleConfiguration: !If
        - VersioningEnabled
        - Rules:
            - Id: CleanOldVersions
              Status: Enabled
              NoncurrentVersionExpiration:
                NoncurrentDays: !Ref NoncurrentVersionRetentionDays
              AbortIncompleteMultipartUpload:
                DaysAfterInitiation: 7
        - !Ref AWS::NoValue
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-private-bucket'
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  EnforceTLSBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref PrivateBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt PrivateBucket.Arn
              - !Sub '${PrivateBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: 'false'

Outputs:
  BucketName:
    Description: Nombre del bucket S3.
    Value: !Ref PrivateBucket
    Export:
      Name: !Sub '${AWS::StackName}-BucketName'
  BucketArn:
    Description: ARN del bucket S3.
    Value: !GetAtt PrivateBucket.Arn
    Export:
      Name: !Sub '${AWS::StackName}-BucketArn'
