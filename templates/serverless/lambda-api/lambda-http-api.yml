AWSTemplateFormatVersion: '2010-09-09'
Description: Crea una funcion Lambda expuesta por API Gateway HTTP API.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Funcion Lambda"
        Parameters: [FunctionName, LambdaTimeout, LambdaMemorySize, LambdaArchitecture, EnvironmentName]
      - Label:
          default: "Logging"
        Parameters: [LogRetentionInDays]
      - Label:
          default: "Resiliencia"
        Parameters: [EnableDlq]
    ParameterLabels:
      FunctionName:
        default: "Nombre de la funcion"
      LambdaTimeout:
        default: "Timeout (segundos)"
      LambdaMemorySize:
        default: "Memoria (MB)"
      LambdaArchitecture:
        default: "Arquitectura"
      EnvironmentName:
        default: "Ambiente"
      LogRetentionInDays:
        default: "Retencion de logs (dias)"
      EnableDlq:
        default: "Habilitar Dead Letter Queue"

Parameters:
  FunctionName:
    Type: String
    Default: ''
    AllowedPattern: '^$|^[A-Za-z0-9-_]{1,64}$'
    Description: Nombre opcional de la funcion Lambda.
  LogRetentionInDays:
    Type: Number
    Default: 14
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90]
    Description: Dias de retencion de logs en CloudWatch.
  LambdaTimeout:
    Type: Number
    Default: 10
    MinValue: 1
    MaxValue: 900
    Description: Tiempo maximo de ejecucion de la funcion Lambda en segundos.
  LambdaMemorySize:
    Type: Number
    Default: 128
    AllowedValues: [128, 256, 512, 1024, 2048, 3008]
    Description: Memoria asignada a la funcion Lambda en MB.
  EnableDlq:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Habilita una cola SQS como Dead Letter Queue para invocaciones asincronas de la funcion.
  LambdaArchitecture:
    Type: String
    Default: arm64
    AllowedValues: [x86_64, arm64]
    Description: Arquitectura de la funcion. arm64 (Graviton2) es ~20% mas barato con igual o mejor rendimiento.
  EnvironmentName:
    Type: String
    Default: lab
    AllowedValues: [lab, dev, staging, prod]
    Description: Ambiente de despliegue usado en los tags.

Conditions:
  UseFunctionName: !Not [!Equals [!Ref FunctionName, '']]
  HasDlq: !Equals [!Ref EnableDlq, 'true']

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-lambda-role'

  ApiFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !If [UseFunctionName, !Ref FunctionName, !Ref AWS::NoValue]
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Architectures:
        - !Ref LambdaArchitecture
      Timeout: !Ref LambdaTimeout
      MemorySize: !Ref LambdaMemorySize
      DeadLetterConfig: !If
        - HasDlq
        - TargetArn: !GetAtt LambdaDeadLetterQueue.Arn
        - !Ref AWS::NoValue
      TracingConfig:
        Mode: Active
      Code:
        ZipFile: |
          import json

          def handler(event, context):
              body = {
                  "message": "Hello from Lambda and CloudFormation",
                  "requestId": event.get("requestContext", {}).get("requestId")
              }
              return {
                  "statusCode": 200,
                  "headers": {"content-type": "application/json"},
                  "body": json.dumps(body)
              }
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-function'
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  LambdaDeadLetterQueue:
    Type: AWS::SQS::Queue
    Condition: HasDlq
    Properties:
      MessageRetentionPeriod: 1209600
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-dlq'
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  ApiFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ApiFunction}'
      RetentionInDays: !Ref LogRetentionInDays

  ApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/apigateway/${AWS::StackName}-access-logs'
      RetentionInDays: !Ref LogRetentionInDays

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub '${AWS::StackName}-http-api'
      ProtocolType: HTTP
      CorsConfiguration:
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowMethods:
          - GET
          - OPTIONS
        AllowOrigins:
          - '*'
      Tags:
        Name: !Sub '${AWS::StackName}-http-api'

  LambdaIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ApiFunction.Arn
      PayloadFormatVersion: '2.0'

  DefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'GET /'
      Target: !Sub 'integrations/${LambdaIntegration}'

  DefaultStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: '$default'
      AutoDeploy: true
      AccessLogSettings:
        DestinationArn: !GetAtt ApiAccessLogGroup.Arn
        Format: '{"requestId":"$context.requestId","ip":"$context.identity.sourceIp","requestTime":"$context.requestTime","httpMethod":"$context.httpMethod","routeKey":"$context.routeKey","status":"$context.status","responseLength":"$context.responseLength","integrationLatency":"$context.integrationLatency"}'
      DefaultRouteSettings:
        ThrottlingBurstLimit: 100
        ThrottlingRateLimit: 50
      Tags:
        Name: !Sub '${AWS::StackName}-default-stage'

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ApiFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*'

Outputs:
  ApiEndpoint:
    Description: Endpoint publico del HTTP API.
    Value: !GetAtt HttpApi.ApiEndpoint
    Export:
      Name: !Sub '${AWS::StackName}-ApiEndpoint'
  FunctionName:
    Description: Nombre de la funcion Lambda.
    Value: !Ref ApiFunction
    Export:
      Name: !Sub '${AWS::StackName}-FunctionName'
  DeadLetterQueueUrl:
    Condition: HasDlq
    Description: URL de la cola SQS Dead Letter Queue.
    Value: !Ref LambdaDeadLetterQueue
    Export:
      Name: !Sub '${AWS::StackName}-DlqUrl'
