AWSTemplateFormatVersion: '2010-09-09'
Description: Crea una VPC basica con dos subnets publicas y salida a internet.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Direccionamiento IP"
        Parameters: [VpcCidr, PublicSubnetOneCidr, PublicSubnetTwoCidr]
      - Label:
          default: "Observabilidad"
        Parameters: [EnableFlowLogs, FlowLogRetentionInDays]
      - Label:
          default: "Configuracion"
        Parameters: [EnvironmentName]
    ParameterLabels:
      VpcCidr:
        default: "CIDR de la VPC"
      PublicSubnetOneCidr:
        default: "CIDR Subnet Publica 1 (AZ-a)"
      PublicSubnetTwoCidr:
        default: "CIDR Subnet Publica 2 (AZ-b)"
      EnableFlowLogs:
        default: "Habilitar VPC Flow Logs"
      FlowLogRetentionInDays:
        default: "Retencion de Flow Logs (dias)"
      EnvironmentName:
        default: "Ambiente"

Parameters:
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}/([0-9]|[12][0-9]|3[0-2])$'
    Description: CIDR IPv4 para la VPC.
  PublicSubnetOneCidr:
    Type: String
    Default: 10.0.0.0/24
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}/([0-9]|[12][0-9]|3[0-2])$'
    Description: CIDR IPv4 para la primera subnet publica.
  PublicSubnetTwoCidr:
    Type: String
    Default: 10.0.1.0/24
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}/([0-9]|[12][0-9]|3[0-2])$'
    Description: CIDR IPv4 para la segunda subnet publica.
  EnableFlowLogs:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Habilita VPC Flow Logs en CloudWatch Logs para auditoria de trafico.
  FlowLogRetentionInDays:
    Type: Number
    Default: 14
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90]
    Description: Dias de retencion de VPC Flow Logs en CloudWatch.
  EnvironmentName:
    Type: String
    Default: lab
    AllowedValues: [lab, dev, staging, prod]
    Description: Ambiente de despliegue usado en los tags.

Conditions:
  EnableFlowLogsCondition: !Equals [!Ref EnableFlowLogs, 'true']

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-vpc'
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-igw'

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref VPC

  PublicSubnetOne:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: !Ref PublicSubnetOneCidr
      MapPublicIpOnLaunch: true
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-public-a'

  PublicSubnetTwo:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: !Ref PublicSubnetTwoCidr
      MapPublicIpOnLaunch: true
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-public-b'

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-public-rt'

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetOneRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetOne

  PublicSubnetTwoRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetTwo

  FlowLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: EnableFlowLogsCondition
    Properties:
      LogGroupName: !Sub '/aws/vpc/flowlogs/${AWS::StackName}'
      RetentionInDays: !Ref FlowLogRetentionInDays

  FlowLogRole:
    Type: AWS::IAM::Role
    Condition: EnableFlowLogsCondition
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: vpc-flow-logs.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: VpcFlowLogsWritePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource: !GetAtt FlowLogGroup.Arn
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-flowlog-role'
        - Key: ManagedBy
          Value: CloudFormation

  VpcFlowLog:
    Type: AWS::EC2::FlowLog
    Condition: EnableFlowLogsCondition
    Properties:
      DeliverLogsPermissionArn: !GetAtt FlowLogRole.Arn
      LogGroupName: !Ref FlowLogGroup
      ResourceId: !Ref VPC
      ResourceType: VPC
      TrafficType: ALL
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-flow-log'
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  VpcId:
    Description: ID de la VPC creada.
    Value: !Ref VPC
    Export:
      Name: !Sub '${AWS::StackName}-VpcId'
  PublicSubnetOneId:
    Description: ID de la primera subnet publica.
    Value: !Ref PublicSubnetOne
    Export:
      Name: !Sub '${AWS::StackName}-PublicSubnetOneId'
  PublicSubnetTwoId:
    Description: ID de la segunda subnet publica.
    Value: !Ref PublicSubnetTwo
    Export:
      Name: !Sub '${AWS::StackName}-PublicSubnetTwoId'
  FlowLogGroupName:
    Condition: EnableFlowLogsCondition
    Description: Nombre del log group de VPC Flow Logs en CloudWatch.
    Value: !Ref FlowLogGroup
    Export:
      Name: !Sub '${AWS::StackName}-FlowLogGroupName'
