AWSTemplateFormatVersion: '2010-09-09'
Description: Crea una tabla DynamoDB on-demand con cifrado y point-in-time recovery.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Identificacion"
        Parameters: [TableName, EnvironmentName]
      - Label:
          default: "Partition Key"
        Parameters: [PartitionKeyName, PartitionKeyType]
      - Label:
          default: "Sort Key"
        Parameters: [EnableSortKey, SortKeyName, SortKeyType]
    ParameterLabels:
      TableName:
        default: "Nombre de la tabla"
      EnvironmentName:
        default: "Ambiente"
      PartitionKeyName:
        default: "Nombre de la partition key"
      PartitionKeyType:
        default: "Tipo de la partition key"
      EnableSortKey:
        default: "Habilitar sort key"
      SortKeyName:
        default: "Nombre de la sort key"
      SortKeyType:
        default: "Tipo de la sort key"

Parameters:
  TableName:
    Type: String
    Default: ''
    AllowedPattern: '^$|^[A-Za-z0-9_.-]{3,255}$'
    Description: Nombre opcional de la tabla. Dejalo vacio para que CloudFormation genere uno.
  PartitionKeyName:
    Type: String
    Default: pk
    AllowedPattern: '^[A-Za-z][A-Za-z0-9_]*$'
    Description: Nombre de la partition key.
  SortKeyName:
    Type: String
    Default: sk
    AllowedPattern: '^[A-Za-z][A-Za-z0-9_]*$'
    Description: Nombre de la sort key.
  PartitionKeyType:
    Type: String
    Default: S
    AllowedValues: [S, N, B]
    Description: Tipo de la partition key (S=String, N=Number, B=Binary).
  SortKeyType:
    Type: String
    Default: S
    AllowedValues: [S, N, B]
    Description: Tipo de la sort key (S=String, N=Number, B=Binary).
  EnableSortKey:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Incluye una sort key (RANGE) en la tabla. Desactivalo para tablas de solo partition key.
  EnvironmentName:
    Type: String
    Default: lab
    AllowedValues: [lab, dev, staging, prod]
    Description: Ambiente de despliegue usado en los tags.

Conditions:
  UseTableName: !Not [!Equals [!Ref TableName, '']]
  HasSortKey: !Equals [!Ref EnableSortKey, 'true']

Resources:
  AppTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !If [UseTableName, !Ref TableName, !Ref AWS::NoValue]
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: !Ref PartitionKeyName
          AttributeType: !Ref PartitionKeyType
        - !If
          - HasSortKey
          - AttributeName: !Ref SortKeyName
            AttributeType: !Ref SortKeyType
          - !Ref AWS::NoValue
      KeySchema:
        - AttributeName: !Ref PartitionKeyName
          KeyType: HASH
        - !If
          - HasSortKey
          - AttributeName: !Ref SortKeyName
            KeyType: RANGE
          - !Ref AWS::NoValue
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-table'
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  TableName:
    Description: Nombre de la tabla DynamoDB.
    Value: !Ref AppTable
    Export:
      Name: !Sub '${AWS::StackName}-TableName'
  TableArn:
    Description: ARN de la tabla DynamoDB.
    Value: !GetAtt AppTable.Arn
    Export:
      Name: !Sub '${AWS::StackName}-TableArn'
