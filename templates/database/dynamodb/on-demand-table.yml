AWSTemplateFormatVersion: '2010-09-09'
Description: Crea una tabla DynamoDB on-demand con cifrado, PITR y controles opcionales de operacion.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Identificacion"
        Parameters: [TableName, EnvironmentName]
      - Label:
          default: "Partition Key"
        Parameters: [PartitionKeyName, PartitionKeyType]
      - Label:
          default: "Sort Key"
        Parameters: [EnableSortKey, SortKeyName, SortKeyType]
      - Label:
          default: "Proteccion y operacion"
        Parameters:
          - EnableDeletionProtection
          - EnableTimeToLive
          - TtlAttributeName
          - EnableStreams
          - StreamViewType
          - EnableContributorInsights
    ParameterLabels:
      TableName:
        default: "Nombre de la tabla"
      EnvironmentName:
        default: "Ambiente"
      PartitionKeyName:
        default: "Nombre de la partition key"
      PartitionKeyType:
        default: "Tipo de la partition key"
      EnableSortKey:
        default: "Habilitar sort key"
      SortKeyName:
        default: "Nombre de la sort key"
      SortKeyType:
        default: "Tipo de la sort key"
      EnableDeletionProtection:
        default: "Proteccion contra borrado"
      EnableTimeToLive:
        default: "Habilitar TTL"
      TtlAttributeName:
        default: "Atributo TTL"
      EnableStreams:
        default: "Habilitar DynamoDB Streams"
      StreamViewType:
        default: "Vista del stream"
      EnableContributorInsights:
        default: "Contributor Insights"

Parameters:
  TableName:
    Type: String
    Default: ''
    AllowedPattern: '^$|^[A-Za-z0-9_.-]{3,255}$'
    Description: Nombre opcional de la tabla. Dejalo vacio para que CloudFormation genere uno.
  PartitionKeyName:
    Type: String
    Default: pk
    AllowedPattern: '^[A-Za-z][A-Za-z0-9_]*$'
    Description: Nombre de la partition key.
  SortKeyName:
    Type: String
    Default: sk
    AllowedPattern: '^[A-Za-z][A-Za-z0-9_]*$'
    Description: Nombre de la sort key.
  PartitionKeyType:
    Type: String
    Default: S
    AllowedValues: [S, N, B]
    Description: Tipo de la partition key (S=String, N=Number, B=Binary).
  SortKeyType:
    Type: String
    Default: S
    AllowedValues: [S, N, B]
    Description: Tipo de la sort key (S=String, N=Number, B=Binary).
  EnableSortKey:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Incluye una sort key (RANGE) en la tabla. Desactivalo para tablas de solo partition key.
  EnableDeletionProtection:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Evita borrados accidentales de la tabla desde DynamoDB.
  EnableTimeToLive:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Habilita expiracion automatica de items mediante un atributo epoch timestamp.
  TtlAttributeName:
    Type: String
    Default: ttl
    AllowedPattern: '^[A-Za-z][A-Za-z0-9_]*$'
    Description: Nombre del atributo TTL cuando EnableTimeToLive=true.
  EnableStreams:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Habilita DynamoDB Streams para integraciones event-driven.
  StreamViewType:
    Type: String
    Default: NEW_AND_OLD_IMAGES
    AllowedValues: [KEYS_ONLY, NEW_IMAGE, OLD_IMAGE, NEW_AND_OLD_IMAGES]
    Description: Tipo de informacion expuesta en DynamoDB Streams.
  EnableContributorInsights:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Habilita Contributor Insights para diagnostico de patrones de acceso.
  EnvironmentName:
    Type: String
    Default: lab
    AllowedValues: [lab, dev, staging, prod]
    Description: Ambiente de despliegue usado en los tags.

Conditions:
  UseTableName: !Not [!Equals [!Ref TableName, '']]
  HasSortKey: !Equals [!Ref EnableSortKey, 'true']
  HasTimeToLive: !Equals [!Ref EnableTimeToLive, 'true']
  HasStreams: !Equals [!Ref EnableStreams, 'true']
  HasContributorInsights: !Equals [!Ref EnableContributorInsights, 'true']

Resources:
  AppTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !If [UseTableName, !Ref TableName, !Ref AWS::NoValue]
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: !Ref PartitionKeyName
          AttributeType: !Ref PartitionKeyType
        - !If
          - HasSortKey
          - AttributeName: !Ref SortKeyName
            AttributeType: !Ref SortKeyType
          - !Ref AWS::NoValue
      KeySchema:
        - AttributeName: !Ref PartitionKeyName
          KeyType: HASH
        - !If
          - HasSortKey
          - AttributeName: !Ref SortKeyName
            KeyType: RANGE
          - !Ref AWS::NoValue
      DeletionProtectionEnabled: !Ref EnableDeletionProtection
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      TimeToLiveSpecification: !If
        - HasTimeToLive
        - AttributeName: !Ref TtlAttributeName
          Enabled: true
        - !Ref AWS::NoValue
      StreamSpecification: !If
        - HasStreams
        - StreamViewType: !Ref StreamViewType
        - !Ref AWS::NoValue
      ContributorInsightsSpecification: !If
        - HasContributorInsights
        - Enabled: true
        - !Ref AWS::NoValue
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-table'
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  TableName:
    Description: Nombre de la tabla DynamoDB.
    Value: !Ref AppTable
    Export:
      Name: !Sub '${AWS::StackName}-TableName'
  TableArn:
    Description: ARN de la tabla DynamoDB.
    Value: !GetAtt AppTable.Arn
    Export:
      Name: !Sub '${AWS::StackName}-TableArn'
  StreamArn:
    Condition: HasStreams
    Description: ARN del stream de DynamoDB.
    Value: !GetAtt AppTable.StreamArn
    Export:
      Name: !Sub '${AWS::StackName}-StreamArn'
